{% extends "base.html" %}
{% block title %}Editar negocio{% endblock %}
{% block content %}
<div class="bg-white rounded-4 shadow-soft p-4">
  {% include "dashboard/_back_to_dashboard.html" %}
  <h1 class="h5 fw-bold">Editar perfil</h1>
  <form method="post" enctype="multipart/form-data" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-brand text-white">Guardar</button>
  </form>
</div>
{% endblock %}
