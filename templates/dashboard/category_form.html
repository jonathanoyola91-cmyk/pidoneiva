{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="bg-white rounded-4 shadow-soft p-4">
  {% include "dashboard/_back_to_dashboard.html" %}
  <h1 class="h5 fw-bold">{{ title }}</h1>
  <form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-brand text-white">Guardar</button>
    <a class="btn btn-outline-secondary" href="{% url 'category_list' %}">Volver</a>
  </form>
</div>
{% endblock %}
