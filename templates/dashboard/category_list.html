{% extends "base.html" %}
{% block title %}Categorías{% endblock %}
{% block content %}
<div class="bg-white rounded-4 shadow-soft p-4">
  {% include "dashboard/_back_to_dashboard.html" %}
  <div class="d-flex justify-content-between align-items-center">
    <h1 class="h5 fw-bold mb-0">Categorías</h1>
    <a class="btn btn-brand text-white" href="{% url 'category_create' %}">Nueva</a>
  </div>

  <table class="table mt-3">
    <tr><th>Nombre</th><th>Orden</th><th></th></tr>
    {% for c in cats %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.order }}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'category_edit' c.id %}">Editar</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'category_delete' c.id %}">Eliminar</a>
        </td>
      </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
