{% extends "base.html" %}
{% block title %}Eliminar{% endblock %}
{% block content %}
<div class="bg-white rounded-4 shadow-soft p-4">
  {% include "dashboard/_back_to_dashboard.html" %}
  <h1 class="h5 fw-bold">Confirmar eliminación</h1>
  <p class="text-secondary">¿Seguro que deseas eliminar: <strong>{{ obj }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Eliminar</button>
    <a class="btn btn-outline-secondary" href="javascript:history.back()">Cancelar</a>
  </form>
</div>
{% endblock %}
