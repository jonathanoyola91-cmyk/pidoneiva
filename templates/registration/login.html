{% extends "base.html" %}
{% block title %}Iniciar sesión · PidoNeiva{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="bg-white rounded-4 shadow-soft p-4">
      <h1 class="h5 fw-bold">Iniciar sesión</h1>
      <p class="text-secondary small">Accede para administrar tu negocio.</p>

      <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-brand text-white w-100">Entrar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
